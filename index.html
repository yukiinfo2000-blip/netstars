<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>呼叫中心利润看板</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
    font-family: "HarmonyOS Sans", Arial;
    background: #f5f7fb;
    margin: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

/* 顶部卡片 */
.dashboard {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.card {
    flex: 1;
    margin: 10px;
    padding: 20px;
    border-radius: 15px;
    color: white;
    text-align: center;
    font-size: 20px;
}

.income { background: linear-gradient(135deg, #4facfe, #00f2fe); }
.expense { background: linear-gradient(135deg, #ff758c, #ff7eb3); }
.profit { background: linear-gradient(135deg, #43e97b, #38f9d7); }

.chart-box {
    background: white;
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}

/* 下方并排 */
.row {
    display: flex;
    gap: 20px;
}

.row canvas {
    width: 100% !important;
}

/* 蒙版 */
.overlay {
    position: absolute;
    background: rgba(200,200,200,0.2);
    pointer-events: none;
}

</style>
</head>

<body>

<h1>📊 呼叫中心利润看板</h1>

<!-- 月份选择 -->
<div style="text-align:center; margin-bottom:20px;">
    选择月份：
    <input type="month" id="monthPicker">
</div>

<!-- KPI -->
<div class="dashboard">
    <div class="card income">收入<br><span id="incomeVal">0</span></div>
    <div class="card expense">成本<br><span id="expenseVal">0</span></div>
    <div class="card profit">利润<br><span id="profitVal">0</span></div>
</div>

<!-- 利润图 -->
<div class="chart-box">
    <canvas id="profitChart"></canvas>
</div>

<!-- 收入 + 成本 -->
<div class="row">
    <div class="chart-box"><canvas id="incomeChart"></canvas></div>
    <div class="chart-box"><canvas id="expenseChart"></canvas></div>
</div>

<script>

// 🔑 替换这里
const SUPABASE_URL = "https://ieijoczgnndiqmowadty.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllaWpvY3pnbm5kaXFtb3dhZHR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMDM4MzksImV4cCI6MjA4ODc3OTgzOX0.vkhnClBek5ZZvJfW9fZwRpKnAVRViTd3EJOsWOJNuwg";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 当前月份
let currentMonth = new Date().toISOString().slice(0,7);
document.getElementById("monthPicker").value = currentMonth;

// 获取数据
async function loadData() {

    const { data: incomeData } = await supabase.from('income').select('*');
    const { data: expenseData } = await supabase.from('expenses').select('*');

    let incomeMonthly = {};
    let expenseMonthly = {};

    // 按月汇总
    incomeData.forEach(i=>{
        let m = i.date.slice(0,7);
        incomeMonthly[m] = (incomeMonthly[m] || 0) + Number(i.mumeric);
    });

    expenseData.forEach(i=>{
        let m = i.date.slice(0,7);
        expenseMonthly[m] = (expenseMonthly[m] || 0) + Number(i.mumeric);
    });

    // 所有月份
    let months = Array.from(new Set([
        ...Object.keys(incomeMonthly),
        ...Object.keys(expenseMonthly)
    ])).sort();

    let incomeArr = [];
    let expenseArr = [];
    let profitArr = [];

    months.forEach(m=>{
        let inc = incomeMonthly[m] || 0;
        let exp = expenseMonthly[m] || 0;
        incomeArr.push(inc);
        expenseArr.push(exp);
        profitArr.push(inc - exp);
    });

    renderCharts(months, incomeArr, expenseArr, profitArr);
    updateKPI(months, incomeArr, expenseArr);

}

// KPI 更新
function updateKPI(months, incomeArr, expenseArr) {
    let selected = document.getElementById("monthPicker").value;

    let idx = months.indexOf(selected);

    let income = incomeArr[idx] || 0;
    let expense = expenseArr[idx] || 0;
    let profit = income - expense;

    document.getElementById("incomeVal").innerText = income;
    document.getElementById("expenseVal").innerText = expense;
    document.getElementById("profitVal").innerText = profit;
}

// 图表
function renderCharts(months, incomeArr, expenseArr, profitArr) {

    let now = new Date().toISOString().slice(0,7);
    let splitIndex = months.findIndex(m => m > now);

    function splitData(arr){
        return {
            real: arr.map((v,i)=> i<splitIndex ? v : null),
            forecast: arr.map((v,i)=> i>=splitIndex ? v : null)
        }
    }

    let p = splitData(profitArr);
    let i = splitData(incomeArr);
    let e = splitData(expenseArr);

    new Chart(document.getElementById("profitChart"), {
        type: 'line',
        data: {
            labels: months,
            datasets: [
                { label:"实际利润", data:p.real, borderColor:"blue", tension:0.3 },
                { label:"预测利润", data:p.forecast, borderColor:"red", borderDash:[5,5] }
            ]
        }
    });

    new Chart(document.getElementById("incomeChart"), {
        type: 'line',
        data: {
            labels: months,
            datasets: [
                { label:"收入", data:i.real, borderColor:"blue" },
                { label:"预测", data:i.forecast, borderColor:"red", borderDash:[5,5] }
            ]
        }
    });

    new Chart(document.getElementById("expenseChart"), {
        type: 'line',
        data: {
            labels: months,
            datasets: [
                { label:"成本", data:e.real, borderColor:"blue" },
                { label:"预测", data:e.forecast, borderColor:"red", borderDash:[5,5] }
            ]
        }
    });

}

// 切换月份
document.getElementById("monthPicker").addEventListener("change", loadData);

// 初始化
loadData();

</script>

</body>
</html>
