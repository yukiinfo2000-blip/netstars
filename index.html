<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>呼叫中心利润看板</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family: Arial;
    background: #f5f7fb;
    margin: 20px;
}
h1 { text-align: center; }

.dashboard {
    display: flex;
    gap: 15px;
}
.card {
    flex: 1;
    padding: 20px;
    border-radius: 12px;
    color: #fff;
    text-align: center;
    font-size: 20px;
}
.income { background: #4facfe; }
.expense { background: #ff6b6b; }
.profit { background: #2ecc71; }

.chart-box {
    background: #fff;
    margin-top: 20px;
    padding: 20px;
    border-radius: 12px;
}
.row {
    display: flex;
    gap: 20px;
}
</style>
</head>

<body>

<h1>📊 呼叫中心利润看板</h1>

<div style="text-align:center;margin-bottom:20px;">
    <input type="month" id="monthPicker">
</div>

<div class="dashboard">
    <div class="card income">收入<br><span id="incomeVal">0</span></div>
    <div class="card expense">成本<br><span id="expenseVal">0</span></div>
    <div class="card profit">利润<br><span id="profitVal">0</span></div>
</div>

<div class="chart-box">
    <canvas id="profitChart"></canvas>
</div>

<div class="row">
    <div class="chart-box"><canvas id="incomeChart"></canvas></div>
    <div class="chart-box"><canvas id="expenseChart"></canvas></div>
</div>

<script>

// 🔑 填你的 Supabase 信息
const SUPABASE_URL = "https://ieijoczgnndiqmowadty.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllaWpvY3pnbm5kaXFtb3dhZHR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMDM4MzksImV4cCI6MjA4ODc3OTgzOX0.vkhnClBek5ZZvJfW9fZwRpKnAVRViTd3EJOsWOJNuwg";

// ✅ 正确初始化（v2标准写法）
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

// 默认月份
let currentMonth = new Date().toISOString().slice(0,7);
document.getElementById("monthPicker").value = currentMonth;

// 加载数据
async function loadData() {

    console.log("🚀 开始加载");

    const { data: incomeData, error: e1 } = await supabaseClient.from('income').select('*');
    const { data: expenseData, error: e2 } = await supabaseClient.from('expenses').select('*');

    console.log("收入:", incomeData);
    console.log("支出:", expenseData);

    // 👇 挂到全局（方便你调试）
    window.incomeData = incomeData;
    window.expenseData = expenseData;

    if (e1 || e2) {
        alert("数据库读取失败");
        console.error(e1, e2);
        return;
    }

    if (!incomeData || !expenseData) {
        alert("没有数据");
        return;
    }

    let incomeMonthly = {};
    let expenseMonthly = {};

    // ✅ 日期统一处理（关键）
    incomeData.forEach(i=>{
        let d = new Date(i.date);
        let m = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0');
        incomeMonthly[m] = (incomeMonthly[m] || 0) + Number(i.mumeric || 0);
    });

    expenseData.forEach(i=>{
        let d = new Date(i.date);
        let m = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0');
        expenseMonthly[m] = (expenseMonthly[m] || 0) + Number(i.mumeric || 0);
    });

    // ✅ 自动补全年12个月
    let year = new Date().getFullYear();
    let months = [];
    for(let i=1;i<=12;i++){
        months.push(`${year}-${String(i).padStart(2,'0')}`);
    }

    let incomeArr = [];
    let expenseArr = [];
    let profitArr = [];

    months.forEach(m=>{
        let inc = incomeMonthly[m] || 0;
        let exp = expenseMonthly[m] || 0;
        incomeArr.push(inc);
        expenseArr.push(exp);
        profitArr.push(inc - exp);
    });

    updateKPI(months, incomeArr, expenseArr);
    renderCharts(months, incomeArr, expenseArr, profitArr);
}

// KPI
function updateKPI(months, incomeArr, expenseArr) {
    let selected = document.getElementById("monthPicker").value;
    let idx = months.indexOf(selected);

    if (idx === -1) idx = new Date().getMonth();

    let inc = incomeArr[idx] || 0;
    let exp = expenseArr[idx] || 0;

    document.getElementById("incomeVal").innerText = inc;
    document.getElementById("expenseVal").innerText = exp;
    document.getElementById("profitVal").innerText = inc - exp;
}

// 图表
function renderCharts(months, incomeArr, expenseArr, profitArr) {

    let now = new Date().toISOString().slice(0,7);
    let splitIndex = months.findIndex(m => m > now);
    if (splitIndex === -1) splitIndex = months.length;

    function split(arr){
        return {
            real: arr.map((v,i)=> i<splitIndex ? v : null),
            forecast: arr.map((v,i)=> i>=splitIndex ? v : null)
        }
    }

    let p = split(profitArr);
    let i = split(incomeArr);
    let e = split(expenseArr);

    new Chart(document.getElementById("profitChart"), {
        type:'line',
        data:{
            labels:months,
            datasets:[
                {label:"实际利润", data:p.real, borderColor:"blue", tension:0.3},
                {label:"预测利润", data:p.forecast, borderColor:"red", borderDash:[5,5]}
            ]
        }
    });

    new Chart(document.getElementById("incomeChart"), {
        type:'line',
        data:{
            labels:months,
            datasets:[
                {label:"收入", data:i.real, borderColor:"blue"},
                {label:"预测", data:i.forecast, borderColor:"red", borderDash:[5,5]}
            ]
        }
    });

    new Chart(document.getElementById("expenseChart"), {
        type:'line',
        data:{
            labels:months,
            datasets:[
                {label:"成本", data:e.real, borderColor:"blue"},
                {label:"预测", data:e.forecast, borderColor:"red", borderDash:[5,5]}
            ]
        }
    });
}

// 监听
document.getElementById("monthPicker").addEventListener("change", loadData);

// 启动
loadData();

</script>

</body>
</html>
